<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palace Club - Gestion Légale</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body data-page="legal">
    <header>
        <div class="brand neon-pink">Palace Mgmt</div>
        <nav>
            <span id="userInfo" style="margin-right: 20px; color: #aaa;"></span>
            <a href="#" id="linkIllegal" class="hidden neon-blue">Darknet (Weed)</a>
            <a href="#" id="logoutBtn">Déconnexion</a>
        </nav>
    </header>

    <div class="container dashboard-grid">
        <!-- Section Facturation -->
        <div class="card" id="billingSection">
            <h2 class="neon-blue">Nouvelle Facture</h2>
            <form id="billingForm">
                <select id="billItem">
                    <option value="">Chargement des articles...</option>
                </select>
                <input type="number" id="billQty" placeholder="Quantité" min="1" value="1" required>
                <p>Total estimé : $<span id="billTotal">0</span></p>
                <button type="submit">Encaisser le client</button>
            </form>
        </div>

        <!-- Section Inventaire Légal -->
        <div class="card">
            <h2 class="neon-pink">Stock Bar</h2>
            <table id="inventoryTable">
                <thead><tr><th>Article</th><th>Stock</th><th>Prix Unit.</th></tr></thead>
                <tbody><!-- Rempli par JS --></tbody>
            </table>
        </div>

        <!-- Section Comptabilité -->
        <div class="card" style="grid-column: 1 / -1;">
            <h2 class="neon-blue">Comptabilité & Réservations</h2>
            <div style="display: flex; gap: 20px;">
                <div style="flex: 1;">
                    <h3>Dernières Transactions</h3>
                    <table id="transactionsTable">
                        <thead><tr><th>Date</th><th>Type</th><th>Montant</th><th>Détails</th></tr></thead>
                        <tbody><!-- Rempli par JS --></tbody>
                    </table>
                </div>
                <div style="flex: 1;">
                    <h3>Réservations en attente</h3>
                    <table id="reservationsTable">
                        <thead><tr><th>Nom</th><th>Tel</th><th>Détails</th></tr></thead>
                        <tbody><!-- Rempli par JS --></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
