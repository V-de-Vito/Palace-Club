<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palace Club - Opérations Spéciales</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #050505; } /* Plus sombre pour l'illégal */
        .neon-green { color: #fff; text-shadow: 0 0 10px #0f0, 0 0 20px #0f0; }
        .btn-action { margin-bottom: 15px; }
    </style>
</head>
<body data-page="illegal">
    <header>
        <div class="brand neon-green">Palace Underground</div>
        <nav>
            <a href="dashboard-legal.html" class="neon-blue">Retour Légal</a>
            <a href="#" id="logoutBtn">Déconnexion</a>
        </nav>
    </header>

    <div class="container">
        <div id="illegal-msg"></div>
        
        <div class="dashboard-grid">
            <!-- Stocks Illégaux -->
            <div class="card">
                <h2 class="neon-green">Stock Marchandise</h2>
                <table id="illegalInventoryTable">
                    <thead><tr><th>Produit</th><th>Quantité</th></tr></thead>
                    <tbody><!-- Rempli par JS --></tbody>
                </table>
            </div>

            <!-- Automatisations -->
            <div class="card">
                <h2 class="neon-pink">Laboratoire & Traitement</h2>
                
                <div class="btn-action">
                    <h3>🌱 Plantation</h3>
                    <p style="font-size: 0.8em; color: #888;">Coût: 1 Graine, 1 Terreau, 1 Lampe, 2 Eau</p>
                    <button id="btnPlant" class="neon-green">Lancer la pousse (+10 Têtes)</button>
                </div>

                <div class="btn-action">
                    <h3>✂️ Traitement</h3>
                    <p style="font-size: 0.8em; color: #888;">Coût: 10 Têtes, 5 Pochons Vides</p>
                    <button id="btnTreat" class="neon-blue">Conditionner (+5 Pochons Weed)</button>
                </div>
            </div>

            <!-- Transactions Rapides -->
            <div class="card">
                <h2 class="neon-blue">Réseau & Vente</h2>
                <div class="btn-action">
                    <button id="btnSellWeed">Vendre 1 Pochon Weed (+$20)</button>
                </div>
                <div class="btn-action">
                    <button id="btnBuyRaw" class="blue-btn">Acheter Kit de pousse (-$67)</button>
                </div>
            </div>
        </div>

        <!-- Logs -->
        <div class="card">
            <h2>Logs d'activités sécurisés</h2>
            <table id="logsTable">
                <thead><tr><th>Date</th><th>Action</th><th>Détails</th></tr></thead>
                <tbody><!-- Rempli par JS --></tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
